databases:
  - name: hostelbites-db
    databaseName: hostelbites
    user: hostelbites_user
    plan: starter # Starter plan includes daily backups and allows connection pooling (PgBouncer)

services:
  # 1. Backend API (PostgreSQL)
  - type: web
    name: hostelbites-backend
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hostelbites-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: RENDER_EXTERNAL_URL
        value: https://hostelbites-backend-jwmt.onrender.com

  # 2. Customer Frontend (SSR)
  - type: web
    name: hostelbites-customer
    env: node
    plan: starter
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hostelbites-backend-jwmt.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://hostelbites-backend-jwmt.onrender.com

  # 3. Delivery App (SSR)
  - type: web
    name: hostelbites-delivery
    env: node
    plan: starter
    rootDir: delivery-app
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hostelbites-backend-jwmt.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://hostelbites-backend-jwmt.onrender.com

  # 4. Restaurant Portal (SSR)
  - type: web
    name: hostelbites-restaurant
    env: node
    plan: starter
    rootDir: restaurant-portal
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hostelbites-backend-jwmt.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://hostelbites-backend-jwmt.onrender.com

  # 5. Admin Dashboard (SSR)
  - type: web
    name: hostelbites-admin
    env: node
    plan: starter
    rootDir: admin-dashboard
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hostelbites-backend-jwmt.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://hostelbites-backend-jwmt.onrender.com

